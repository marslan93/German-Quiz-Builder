kind = "web"
previewPath = "/"
title = "German Vocabulary Quiz"
version = "1.0.0"
id = "artifacts/german-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21092

[services.development]
run = "pnpm --filter @workspace/german-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/german-quiz", "run", "build" ]
publicDir = "artifacts/german-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21092"
BASE_PATH = "/"
